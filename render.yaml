services:
  - type: web
    name: nexus-ai-server
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn nexus_server_v2:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NEXUS_DB_PATH
        value: "/data/nexus.db"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
    disk:
      name: nexus-data
      mountPath: /data
      sizeGB: 1
